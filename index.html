<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Physics Simulator | Future Glass</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="./assets/js/css/styles.css">
</head>
<body>

  <div class="bg-image"></div>

  <header class="glass">
    <h1>✨ Simulador de Gravedad</h1>
  </header>

  <main>
    <div class="controls glass">
      <div class="input-group">
        <label for="effectSelect">Lanzar desde:</label>
        <select id="effectSelect" class="glass-select">
          <option value="top-left">Esq. Sup. Izquierda</option>
          <option value="top-right">Esq. Sup. Derecha</option>
          <option value="bottom-left">Esq. Inf. Izquierda</option>
          <option value="bottom-right">Esq. Inf. Derecha</option>
          <option value="top">Lluvia (Arriba)</option>
          <option value="bottom">Volcán (Abajo)</option>
        </select>
      </div>

      <button id="btnLaunch" class="btn-primary">¡DISPARAR!</button>

      <div class="input-group">
        <label>Tamaño:</label>
        <input type="number" id="inputWidth" value="800">
        <input type="number" id="inputHeight" value="450">
      </div>
      
      <button id="btnResize">Ajustar Canvas</button>
    </div>

    <div class="canvas-container glass">
      <canvas id="canvas"></canvas>
    </div>
  </main>

  <footer class="glass">
    <p>Desarrollado con 💻 por <strong>[Tu Nombre]</strong></p>
  </footer>

  <script src="./assets/js/main.js"></script>
</body>
</html>
